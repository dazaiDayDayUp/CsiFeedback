model:
  name: "stnet"
  encoded_dim: 64
data:
  data_dir: "./data"
  scenario: "indoor"
  batch_size: 200
  num_workers: 0
  pin_memory: false
  load_raw: true

optimizer:
  name: "adam"
  lr: 0.001
  betas: [0.5, 0.999]
  weight_decay: 0.0
  separate_enc_dec: true

scheduler:
  name: "const"

training:
  epochs: 1000
  device: "auto"
  seed: null
  val_freq: 10
  test_freq: 10
  print_freq: 600
  checkpoint_dir: "./experiments"
  checkpoint_freq: 50
  resume: null
